<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid">

<h3 class="text-white">
<i class="fa-solid fa-user-graduate"></i>
Student Dashboard
</h3>

<button id="logoutBtn" class="btn btn-light">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</div>

</nav>

<div class="container mt-4">

<div class="row mb-4">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h5>Total Students</h5>

<h2 id="totalStudents">0</h2>

</div>

</div>

</div>

<div class="col-md-8">

<input
type="text"
id="searchInput"
class="form-control"
placeholder="Search Student by Name or Roll Number">

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-primary">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Department</th>
<th>Semester</th>
<th>Roll</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

</div>
<!-- Edit Student Modal -->
<div class="modal fade" id="editModal" tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header bg-primary text-white">

                <h5 class="modal-title">
                    Edit Student
                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="editForm">

                    <input type="hidden" id="editId">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>First Name</label>

                            <input
                                type="text"
                                id="editFirstName"
                                class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Last Name</label>

                            <input
                                type="text"
                                id="editLastName"
                                class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                id="editEmail"
                                class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Mobile</label>

                            <input
                                type="text"
                                id="editMobile"
                                class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Department</label>

                            <input
                                type="text"
                                id="editDepartment"
                                class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Semester</label>

                            <input
                                type="text"
                                id="editSemester"
                                class="form-control">

                        </div>

                    
<div class="col-md-6 mb-3">
<label>Father Name</label>
<input type="text" id="editFatherName" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Date of Birth</label>
<input type="date" id="editDob" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Gender</label>
<select id="editGender" class="form-control">
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Roll Number</label>
<input type="text" id="editRoll" class="form-control">
</div>

<div class="col-md-12 mb-3">
<label>Address</label>
<textarea id="editAddress" class="form-control" rows="3"></textarea>
</div>

</div>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Update Student

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<footer class="text-center mt-5 mb-3">

    <small>

        © 2026 Student Registration System | Developed by Vishal Kumar Mishra

    </small>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="dashboard.js"></script>

</body>
</html>
